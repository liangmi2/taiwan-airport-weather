<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣機場氣象能見度</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; }
        h1 { text-align: center; color: #2c3e50; }
        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); }
        .airport-name { font-size: 1.2em; font-weight: bold; color: #34495e; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; margin-bottom: 10px; }
        .visibility { font-size: 1.4em; color: #e74c3c; font-weight: bold; margin: 10px 0; }
        .raw-metar { font-size: 0.85em; color: #7f8c8d; background: #ecf0f1; padding: 8px; border-radius: 4px; font-family: monospace; word-wrap: break-word; flex-grow: 1; }
        .loader { text-align: center; padding: 20px; font-style: italic; color: #7f8c8d; font-weight: bold; }
        .official-btn { display: block; text-align: center; margin-top: 15px; padding: 10px; background-color: #2980b9; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .official-btn:hover { background-color: #3498db; }
    </style>
</head>
<body>
    <h1>台灣機場氣象能見度 ✈️</h1>
    <div id="loading" class="loader">正在初始化...</div>
    <div id="weather-cards" class="card-container"></div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker 註冊成功'))
                    .catch(err => console.log('Service Worker 註冊失敗', err));
            });
        }
    </script>
</body>
</html>
