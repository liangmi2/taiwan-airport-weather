<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣機場氣象能見度</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />

  <meta name="theme-color" content="#2f80c0" />
</head>

<body>
  <main class="page-wrap">
    <header class="page-header">
      <div class="hero-bg"></div>

      <h1>台灣機場氣象能見度 <span class="plane">✈️</span></h1>
      <p>即時機場天氣、風向風速與能見度資訊</p>

      <div id="last-update" class="last-update">
        ⏱️ 正在讀取最新資料...
      </div>
    </header>

    <div id="loading" class="loading-text">
      正在讀取機場氣象資料...
    </div>

    <section id="weather-cards" class="weather-grid"></section>

    <footer class="page-footer">
      <div class="footer-note">
        ℹ️ <strong>能見度說明：</strong>
        紅色數值代表目前機場水平能見度資訊。若部分軍民合用機場於夜間顯示暫無資料，可能為非作業時段或官方暫未發布最新報文。
      </div>
    </footer>
  </main>

  <script src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(err => {
          console.log("Service Worker 註冊失敗：", err);
        });
      });
    }
  </script>
</body>
</html>
