name: 自動更新機場氣象

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安裝 Chrome 瀏覽器
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 安裝必要套件
        run: pip install selenium webdriver-manager requests

      - name: 執行爬蟲抓取資料
        run: python scraper.py

      - name: 將最新資料推送到 GitHub
        run: |
          git config --global user.name "WeatherBot"
          git config --global user.email "bot@github.com"
          git add local_weather.json
          git commit -m "自動更新氣象資料: $(date)" || exit 0
          git push
