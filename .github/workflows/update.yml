name: 自動更新機場氣象

on:
  schedule:
    - cron: '*/20 * * * *' # 每 20 分鐘執行一次
  workflow_dispatch:      # 允許手動點擊按鈕測試

permissions:
  contents: write         # 強制開啟寫入權限，確保能存檔

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安裝 Chrome 瀏覽器
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 安裝 Python 套件
        run: pip install selenium webdriver-manager requests

      - name: 執行爬蟲抓取資料
        run: python scraper.py

      - name: 推送新資料回 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add local_weather.json
          # 檢查檔案是否有變動，有變動才提交，避免產生無意義的紀錄
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新氣象資料: $(date)" && git push origin main)
