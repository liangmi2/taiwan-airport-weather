name: 自動更新機場氣象

on:
  schedule:
    - cron: '*/20 * * * *' # 每 20 分鐘執行一次
  workflow_dispatch:      # 允許手動點擊按鈕執行

permissions:
  contents: write         # 在這裡直接強制開啟寫入權限，確保能更新檔案

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4
        with:
          persist-credentials: true # 保持認證狀態，方便後面 push

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安裝 Chrome 瀏覽器
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 安裝必要套件
        run: pip install selenium webdriver-manager requests

      - name: 執行爬蟲抓取資料
        run: python scraper.py

      - name: 將最新資料推送到 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add local_weather.json
          # 檢查檔案是否有變動，若有變動才提交，避免無意義的紀錄
          git diff --quiet && git diff --staged --quiet || git commit -m "自動更新氣象資料: $(date)"
          git push origin main
