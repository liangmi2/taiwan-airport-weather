name: 自動更新機場氣象

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝 Python 套件
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 執行爬蟲抓取資料
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          echo "===== 開始執行 scraper.py ====="
          python -u scraper.py
          echo "===== scraper.py 執行完成 ====="

      - name: 檢查產生的 local_weather.json
        run: |
          echo "===== 目前目錄 ====="
          pwd
          echo "===== 檔案列表 ====="
          ls -la
          echo "===== local_weather.json ====="
          cat local_weather.json || true
          echo "===== git status ====="
          git status --short

      - name: 將最新資料推送到 GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add local_weather.json

          if git diff --staged --quiet; then
            echo "沒有變更，不需要 commit"
          else
            git commit -m "自動更新機場氣象資料"
            git push origin main
          fi
